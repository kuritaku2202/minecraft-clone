<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Clone</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%234caf50'/%3E%3Crect width='16' height='5' fill='%237cb342'/%3E%3C/svg%3E"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, sans-serif;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #boot-status {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #fff;
        font-size: 12px;
        text-shadow: 1px 1px 2px #000;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="boot-status">booting…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
